name: Electron Playwright Tests

on:
  workflow_dispatch:
    inputs:
      version_name:
        type: string
        description: "Desktop Version. It can be a branch name or a tag or a commit SHA"
        required: true
      instance_details:
        type: string
        description: "JSON array of platform details"
        required: false
      MM_TEST_USER_NAME:
        description: "The admin username of the test instance"
        required: false
        type: string
      MM_TEST_PASSWORD:
        description: "The admin password of the test instance"
        required: false
        type: string
      MM_SERVER_VERSION:
        type: string
        description: "The server version to test against"
        required: true
      run_type:
        type: string
        description: "Run type for test reporting (PR / MASTER). Matterwick sends MASTER for master pushes; PR-label runs leave this blank (default PR)."
        required: false
        default: ""
      pr_number:
        type: string
        description: "PR number, used to remove the E2E label from the PR after tests complete. Dispatchers should set this for PR runs."
        required: false

# Least-privilege default. Jobs that need more (status checks, PR writes) grant it explicitly
# at the job level so that jobs running untrusted PR code do not inherit write scopes.
permissions:
  contents: read

jobs:
  # TSIO reporting model (PR / master / release):
  #   1 workflow run  →  1 composite_identity (gh_run_id + resolved commit SHA + name)
  #   →  1 TSIO report group aggregating every platform leg + both policy legs.
  # Matterwick sets run_type=MASTER for master pushes; PR runs default to desktop-pr.
  prepare-matrix:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.instance_details != '' }}
    runs-on: ubuntu-latest
    outputs:
      platforms: ${{ steps.generate.outputs.platforms }}
      desktop-sha: ${{ steps.resolve-sha.outputs.sha }}
      tsio-composite-identity: ${{ steps.tsio-identity.outputs.composite-identity-json }}
      tsio-total-reports-expected: ${{ steps.tsio-identity.outputs.total-reports-expected }}
    steps:
      - id: generate
        env:
          INSTANCE_DETAILS: ${{ inputs.instance_details }}
        run: |
          # Matterwick still dispatches macos-latest; pin explicitly so the job
          # does not drift when GitHub retargets that label to macOS 26.
          platforms=$(echo "${INSTANCE_DETAILS}" | jq -c 'map(if .runner == "macos-latest" then .runner = "macos-26" else . end)')
          echo "platforms=${platforms}" >> "$GITHUB_OUTPUT"

      # Resolve the SHA under test from version_name (branch/tag/SHA), not github.sha
      # from the dispatch ref — same approach as compatibility-matrix-testing.yml.
      - name: e2e/checkout-desktop-version
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.version_name }}

      - id: resolve-sha
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - id: tsio-identity
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          MM_SHA: ${{ steps.resolve-sha.outputs.sha }}
          MM_BRANCH: ${{ inputs.version_name }}
          PR_NUMBER: ${{ inputs.pr_number }}
          RUN_TYPE: ${{ inputs.run_type || 'PR' }}
          PLATFORMS: ${{ steps.generate.outputs.platforms }}
        run: |
          # platform legs (linux/macos/windows) + policy-tests-macos + policy-tests-windows
          TOTAL=$(( $(echo "${PLATFORMS}" | jq -c 'length') + 2 ))
          echo "total-reports-expected=${TOTAL}" >> "$GITHUB_OUTPUT"
          NAME="desktop-$(echo "${RUN_TYPE}" | tr '[:upper:]' '[:lower:]')"
          if [ -n "${PR_NUMBER}" ]; then
            COMPOSITE_IDENTITY=$(jq -nc \
              --arg repo "${GITHUB_REPOSITORY}" --arg sha "${MM_SHA}" --arg run_id "${GITHUB_RUN_ID}" \
              --arg name "${NAME}" --arg attempt "${GITHUB_RUN_ATTEMPT}" --arg branch "${MM_BRANCH}" --arg pr "${PR_NUMBER}" \
              '{repository:$repo, commit_sha:$sha, gh_run_id:$run_id, name:$name, gh_run_attempt:$attempt, branch:$branch, gh_pr_number:$pr}')
          else
            COMPOSITE_IDENTITY=$(jq -nc \
              --arg repo "${GITHUB_REPOSITORY}" --arg sha "${MM_SHA}" --arg run_id "${GITHUB_RUN_ID}" \
              --arg name "${NAME}" --arg attempt "${GITHUB_RUN_ATTEMPT}" --arg branch "${MM_BRANCH}" \
              '{repository:$repo, commit_sha:$sha, gh_run_id:$run_id, name:$name, gh_run_attempt:$attempt, branch:$branch}')
          fi
          echo "composite-identity-json=${COMPOSITE_IDENTITY}" >> "$GITHUB_OUTPUT"

  update-initial-status:
    name: Set pending TSIO status
    runs-on: ubuntu-24.04
    needs:
      - prepare-matrix
    permissions:
      contents: read
      statuses: write
    steps:
      # Best-effort: a transient status-API hiccup here must never block the
      # actual test matrix from running.
      - uses: mattermost/actions/delivery/update-commit-status@218fd96a63451259dc100e1292a5e44af92fe15d
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          repository_full_name: ${{ github.repository }}
          commit_sha: ${{ needs.prepare-matrix.outputs.desktop-sha }}
          context: e2e-test/desktop-playwright
          description: "Running Electron Playwright E2E tests..."
          status: pending

  e2e-tests:
    needs:
      - prepare-matrix
      - update-initial-status
    name: ${{ matrix.platform }}
    strategy:
      matrix:
        include: ${{ fromJson(needs.prepare-matrix.outputs.platforms) }}
      fail-fast: false
    permissions:
      contents: read
      actions: read
      id-token: write
    uses: ./.github/workflows/e2e-functional-template.yml
    with:
      runs-on: ${{ matrix.runner }}
      DESKTOP_VERSION: ${{ inputs.version_name }}
      MM_TEST_SERVER_URL: ${{ matrix.url }}
      MM_SERVER_VERSION: ${{ inputs.MM_SERVER_VERSION }}
      MM_TEST_USER_NAME: ${{ inputs.MM_TEST_USER_NAME }}
      MM_TEST_PASSWORD: ${{ inputs.MM_TEST_PASSWORD }}
      TYPE: ${{ inputs.run_type || 'PR' }}
      tsio-config: ${{ format('{{"composite_identity":{0},"total_reports_expected":"{1}"}}', needs.prepare-matrix.outputs.tsio-composite-identity, needs.prepare-matrix.outputs.tsio-total-reports-expected) }}
    secrets: inherit

  # The single E2E status check for PR/master (e2e-test/desktop-playwright),
  # replacing the former 5 (e2e/linux, e2e/macos, e2e/windows,
  # policy-test/macos, policy-test/windows).
  #
  # Uses e2e/utils/tsio-report-status.js, not test-system-io-summary — summary
  # only reads /api/v1/orchestration/status, which report-upload never
  # populates (see that file's header comment).
  tsio-summary:
    name: TSIO summary
    runs-on: ubuntu-24.04
    needs:
      - prepare-matrix
      - e2e-tests
      - e2e-policy-tests
    if: always()
    permissions:
      contents: read
      id-token: write
      statuses: write
    steps:
      # tsio-report-status.js is repo code, not fetched by github-script itself.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.version_name }}
          persist-credentials: false
          sparse-checkout: |
            e2e/utils/tsio-report-status.js
            e2e/utils/cmt-channel-notify.js
          sparse-checkout-cone-mode: false

      - name: Render TSIO summary + flip commit status
        id: summary
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          TSIO_COMPOSITE_IDENTITY: ${{ needs.prepare-matrix.outputs.tsio-composite-identity }}
          TSIO_TOTAL_REPORTS_EXPECTED: ${{ needs.prepare-matrix.outputs.tsio-total-reports-expected }}
          # Uploads (esp. screenshots) can finish minutes after Playwright; give TSIO
          # time to attach all legs before we snapshot the group for the channel post.
          TSIO_POLL_ATTEMPTS: 36
          TSIO_POLL_DELAY_MS: 5000
          COMMIT_STATUS_CONTEXT: e2e-test/desktop-playwright
          UPSTREAM_JOBS_SUCCEEDED: ${{ needs.e2e-tests.result == 'success' && needs.e2e-policy-tests.result == 'success' }}
          # PR → MM_DESKTOP_E2E_WEBHOOK_URL; master → MM_E2E_MASTER_HEALTH_WEBHOOK_URL;
          # CMT/RC uses MM_E2E_RELEASE_WEBHOOK_URL (compatibility-matrix-testing.yml).
          # Routing is by compositeIdentity.name in cmt-channel-notify.js.
          MATTERMOST_E2E_WEBHOOK_URL: ${{ secrets.MM_DESKTOP_E2E_WEBHOOK_URL }}
          MATTERMOST_MASTER_HEALTH_WEBHOOK_URL: ${{ secrets.MM_E2E_MASTER_HEALTH_WEBHOOK_URL }}
        with:
          script: |
            const {reportUrl, status, stats} = await require('./e2e/utils/tsio-report-status.js')({
              core, context, github,
              compositeIdentity: JSON.parse(process.env.TSIO_COMPOSITE_IDENTITY),
              totalReportsExpected: parseInt(process.env.TSIO_TOTAL_REPORTS_EXPECTED, 10),
              upstreamJobsSucceeded: process.env.UPSTREAM_JOBS_SUCCEEDED === 'true',
              commitStatusContext: process.env.COMMIT_STATUS_CONTEXT,
              failOnTestFailures: true,
            });
            core.info(`TSIO report ${reportUrl}: ${status} (${JSON.stringify(stats)})`);

  remove-e2e-label:
    name: Remove E2E label from PR
    runs-on: ubuntu-24.04
    permissions:
      issues: write
      pull-requests: write
    needs:
      - e2e-tests
      - e2e-policy-tests
      - tsio-summary
    if: always()
    steps:
      - name: e2e/remove-label-from-pr
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        continue-on-error: true # Label might have been removed manually
        with:
          github-token: ${{ github.token }}
          script: |
            // Use pr_number if provided directly by the dispatcher (e.g. Matterwick)
            let prNumber = parseInt(process.env.PR_NUMBER) || null;

            // Fall back to looking up the PR by head branch when pr_number was not passed
            if (!prNumber) {
              const run = await github.rest.actions.getWorkflowRun({
                owner: context.repo.owner,
                repo: context.repo.repo,
                run_id: context.runId,
              });
              const branchName = run.data.head_branch;
              if (branchName) {
                const headOwner = run.data.head_repository?.owner?.login || context.repo.owner;
                const prs = await github.rest.pulls.list({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  state: 'open',
                  head: `${headOwner}:${branchName}`,
                });
                if (prs.data && prs.data.length > 0) {
                  const matchingPr = prs.data.find((pr) => pr.head && pr.head.sha === run.data.head_sha);
                  prNumber = (matchingPr || prs.data[0]).number;
                }
              }
            }

            if (prNumber) {
              try {
                await github.rest.issues.removeLabel({
                  issue_number: prNumber,
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: 'E2E/Run',
                });
              } catch (error) {
                if (error.status !== 404) {
                  throw error;
                }
                console.log('E2E/Run label already removed');
              }
            } else {
              console.log('Label removal skipped - could not find associated PR');
            }
        env:
          PR_NUMBER: ${{ inputs.pr_number }}

  e2e-policy-tests:
    name: policy-tests-${{ matrix.platform }}
    needs:
      - prepare-matrix
      - update-initial-status
    # Runs untrusted PR code (npm ci / Playwright); grant only what the TSIO
    # upload needs, never pull-requests: write.
    permissions:
      contents: read
      id-token: write
      actions: read
    strategy:
      matrix:
        include:
          - platform: macos
            runner: macos-26
          - platform: windows
            # Pinned to windows-2022 (not -2025) because the 2025 image ships
            # Visual Studio 18 / "2026", which current node-gyp doesn't recognise —
            # `npm ci` then fails to build the registry-js native module.
            # The main e2e-tests matrix also runs on windows-2022; keep them aligned.
            runner: windows-2022
      fail-fast: false
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        shell: bash
    env:
      BRANCH: ${{ github.ref_name }}
      BUILD_TAG: ${{ github.sha }}
      MM_TEST_USER_NAME: ${{ inputs.MM_TEST_USER_NAME || secrets.MM_DESKTOP_E2E_USER_NAME }}
      MM_TEST_PASSWORD: ${{ inputs.MM_TEST_PASSWORD || secrets.MM_DESKTOP_E2E_USER_CREDENTIALS }}
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
      NODE_ENV: "test"
      DEBUG_E2E: "true"
    steps:
      - name: e2e/set-server-url
        env:
          INSTANCE_DETAILS: ${{ inputs.instance_details }}
        run: |
          if [ -z "${INSTANCE_DETAILS}" ]; then
            echo "Error: instance_details input is required but was not provided" >&2
            exit 1
          fi
          RUNNER_OS=$(echo "${{ runner.os }}" | tr '[:upper:]' '[:lower:]')
          URL=$(echo "${INSTANCE_DETAILS}" | jq -r --arg os "$RUNNER_OS" '.[] | select(.runner | ascii_downcase | contains($os)) | .url // empty' | head -1)
          if [ -z "${URL}" ]; then
            echo "Error: No server URL found in instance_details for runner OS: ${RUNNER_OS}" >&2
            exit 1
          fi
          echo "MM_TEST_SERVER_URL=${URL}" >> $GITHUB_ENV

      - name: e2e/checkout-repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.version_name }}

      - name: e2e/setup-node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '22.x'
          package-manager-cache: false

      - name: e2e/use-gnu-tar-macos
        if: runner.os == 'macOS'
        run: |
          # BSD tar on macOS can corrupt actions/cache v5 archives; prefer GNU tar when present.
          # All current macOS runners are arm64 (Homebrew under /opt/homebrew); keep the
          # -x guard so a future non-arm64 matrix entry falls back to BSD tar safely.
          if [ -x /opt/homebrew/opt/gnu-tar/libexec/gnubin/gtar ]; then
            echo "/opt/homebrew/opt/gnu-tar/libexec/gnubin" >> $GITHUB_PATH
          fi

      - name: e2e/cache-node-modules
        id: cache-node-modules
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            node_modules
            e2e/node_modules
          enableCrossOsArchive: false
          # v7: exact restore only — avoids probing legacy v6 blobs that warn on macOS
          key: ${{ runner.os }}-build-node-modules-v7-${{ hashFiles('**/package-lock.json') }}

      - name: e2e/cache-electron-gyp-windows
        if: runner.os == 'Windows'
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: C:\Users\runneradmin\.electron-gyp
          enableCrossOsArchive: false
          key: ${{ runner.os }}-electron-gyp-v7-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-electron-gyp-v7-${{ hashFiles('**/package-lock.json') }}

      - name: e2e/setup-python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        env:
          PIP_NO_CACHE_DIR: "1"
        with:
          python-version: "3.13"

      - name: e2e/install-os-dependencies
        uses: ./.github/actions/install-os-dependencies
        with:
          os: ${{ runner.os }}

      - name: e2e/install-node-dependencies
        run: |
          npm ci
          cd e2e && npm ci

      - name: e2e/suppress-macos-dialogs
        if: runner.os == 'macOS'
        run: |
          # Suppress the "Reopen windows" dialog that blocks Electron startup
          # when a previous test instance was killed by SIGTERM/SIGKILL.
          defaults write com.github.Electron NSQuitAlwaysKeepsWindows -bool false || true
          defaults write com.github.Electron ApplePersistenceIgnoreState -bool YES || true
          defaults write com.apple.LaunchServices LSQuarantine -bool false || true
          defaults write com.apple.CrashReporter DialogType none || true

      - name: e2e/build-test-bundle
        run: npm run build-test

      - name: e2e/run-policy-tests-macos
        if: runner.os == 'macOS'
        run: |
          cd e2e
          set +e
          npm run run:policy
          echo "PLAYWRIGHT_EXIT_CODE=$?" >> $GITHUB_ENV
          npm run send-report || true
        env:
          SERVER_VERSION: ${{ inputs.MM_SERVER_VERSION }}
          DESKTOP_VERSION: ${{ inputs.version_name }}

      - name: e2e/run-policy-tests-windows
        if: runner.os == 'Windows'
        run: |
          cd e2e
          set +e
          npm run run:policy
          echo "PLAYWRIGHT_EXIT_CODE=$?" >> $GITHUB_ENV
          npm run send-report || true
        env:
          SERVER_VERSION: ${{ inputs.MM_SERVER_VERSION }}
          DESKTOP_VERSION: ${{ inputs.version_name }}

      # Joins the same TSIO report group as e2e-tests — gh-job-name must match
      # this job's rendered name (policy-tests-<platform>) above.
      - name: e2e/write-tsio-failure-stub
        if: ${{ always() && needs.prepare-matrix.outputs.tsio-composite-identity != '' && hashFiles('e2e/test-results/results.json') == '' && (failure() || cancelled() || (env.PLAYWRIGHT_EXIT_CODE != '0' && env.PLAYWRIGHT_EXIT_CODE != '')) }}
        run: node e2e/utils/write-tsio-failure-stub.mjs
        env:
          TSIO_GH_JOB_NAME: policy-tests-${{ matrix.platform }}
          PLAYWRIGHT_EXIT_CODE: ${{ env.PLAYWRIGHT_EXIT_CODE }}

      # report-upload walks every png/jpg under screenshots-dir; Electron userdata
      # under e2e/test-results includes cache icons, so collect failure shots only.
      - name: e2e/collect-tsio-screenshots
        if: ${{ always() && needs.prepare-matrix.outputs.tsio-composite-identity != '' && hashFiles('e2e/test-results/results.json') != '' }}
        run: node e2e/utils/collect-tsio-screenshots.mjs

      # Reporting only — a TSIO/upload flake (e.g. screenshot 504) must not fail
      # the job when Playwright already passed. Commit status still comes from TSIO summary.
      - name: e2e/upload-report-to-tsio
        if: ${{ always() && needs.prepare-matrix.outputs.tsio-composite-identity != '' && hashFiles('e2e/test-results/results.json') != '' }}
        continue-on-error: true
        uses: mattermost/mattermost-test-system-io/.github/actions/test-system-io-report-upload@45fb048848edc392f398144f45e2f3e30f43aeaa # release-0.12.0 / main@45fb048 (#81 Maestro FilePath + Detox paths, #82 background finalize)
        with:
          composite-identity: ${{ needs.prepare-matrix.outputs.tsio-composite-identity }}
          total-reports-expected: ${{ needs.prepare-matrix.outputs.tsio-total-reports-expected }}
          framework: playwright
          github-token: ${{ secrets.GITHUB_TOKEN }}
          gh-job-name: policy-tests-${{ matrix.platform }}
          json-path: e2e/test-results/results.json
          screenshots-dir: e2e/test-results/tsio-screenshots

      - name: e2e/handle-nonzero-playwright-exit
        if: always()
        run: |
          if [ -z "${PLAYWRIGHT_EXIT_CODE:-}" ]; then
            exit 0
          fi
          if [ "${PLAYWRIGHT_EXIT_CODE}" = "0" ]; then
            exit 0
          fi
          echo "Playwright exited with code ${PLAYWRIGHT_EXIT_CODE}" >&2
          exit 1

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: policy-test-results-${{ runner.os }}
          path: e2e/playwright-report
          if-no-files-found: ignore
          retention-days: 7
