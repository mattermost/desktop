name: Electron Playwright Tests

on:
  workflow_dispatch:
    inputs:
      version_name:
        type: string
        description: "Desktop Version. It can be a branch name or a tag or a commit SHA"
        required: true
      instance_details:
        type: string
        description: "JSON array of platform details"
        required: false
      MM_TEST_USER_NAME:
        description: "The admin username of the test instance"
        required: false
        type: string
      MM_TEST_PASSWORD:
        description: "The admin password of the test instance"
        required: false
        type: string
      MM_SERVER_VERSION:
        type: string
        description: "The server version to test against"
        required: true
      nightly:
        type: boolean
        description: "True if this is nightly build"
        required: false
        default: false

permissions:
  contents: read
  statuses: write

jobs:
  prepare-matrix:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.instance_details != '' }}
    runs-on: ubuntu-latest
    outputs:
      platforms: ${{ steps.generate.outputs.platforms }}
    steps:
      - id: generate
        run: |
          echo "platforms=$(echo '${{ inputs.instance_details }}' | jq -c)" >> $GITHUB_OUTPUT

  update-initial-status:
    name: Update initial status
    needs: prepare-matrix
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      statuses: write
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Update initial status for all platforms
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          github-token: ${{ github.token }}
          script: |
            const { updateInitialStatus } = require('./e2e/utils/github-actions.js');
            const platforms = ${{ needs.prepare-matrix.outputs.platforms }};
            await updateInitialStatus({ github, context, platforms });

  e2e-tests:
    needs: 
      - prepare-matrix
      - update-initial-status
    name: ${{ matrix.platform }}
    strategy:
      matrix:
        include: ${{ fromJson(needs.prepare-matrix.outputs.platforms) }}
      fail-fast: false
    uses: ./.github/workflows/e2e-functional-template.yml
    with:
      runs-on: ${{ matrix.runner }}
      DESKTOP_VERSION: ${{ inputs.version_name }}
      MM_TEST_SERVER_URL: ${{ matrix.url }}
      MM_SERVER_VERSION: ${{ inputs.MM_SERVER_VERSION }}
      MM_TEST_USER_NAME: ${{ inputs.MM_TEST_USER_NAME }}
      MM_TEST_PASSWORD: ${{ inputs.MM_TEST_PASSWORD }}
      TYPE: ${{ startsWith(github.ref_name, 'release-') && 'RELEASE' || (github.ref_name == 'master' && 'MASTER') || 'PR' }}
      nightly: ${{ inputs.nightly }}
    secrets: inherit

  merge-e2e-report:
    name: Merge E2E report
    runs-on: ubuntu-24.04
    needs:
      - prepare-matrix
      - e2e-tests
    if: always() && !cancelled()
    permissions:
      contents: read
    outputs:
      merged-report-ready: ${{ steps.merge.outputs.merged_report_ready }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '22.x'
          cache: "npm"
          cache-dependency-path: e2e/package-lock.json

      - name: Install E2E dependencies
        run: |
          cd e2e
          npm ci

      - name: Download blob reports
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          pattern: blob-report-*
          path: all-blob-reports
          merge-multiple: true
          if-no-files-found: warn

      - name: Merge Playwright reports
        id: merge
        run: |
          if find all-blob-reports -type f -name '*.zip' | grep -q .; then
            cd e2e
            npx playwright merge-reports --config=merge.playwright.config.ts ../all-blob-reports
            echo "merged_report_ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "No blob reports found to merge." >> "$GITHUB_STEP_SUMMARY"
            echo "merged_report_ready=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload merged Playwright report artifact
        if: always() && steps.merge.outputs.merged_report_ready == 'true'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: playwright-report-merged
          path: e2e/playwright-report-merged
          if-no-files-found: error
          retention-days: 7

  update-final-status:
    name: Update final status
    runs-on: ubuntu-24.04
    needs:
      - prepare-matrix
      - e2e-tests
      - merge-e2e-report
    if: always()
    permissions:
      contents: read
      statuses: write
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Update final status for all platforms
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          github-token: ${{ github.token }}
          script: |
            const { updateFinalStatus } = require('./e2e/utils/github-actions.js');
            const platforms = ${{ needs.prepare-matrix.outputs.platforms }};
            const outputs = ${{ toJSON(needs.e2e-tests.outputs) }};
            await updateFinalStatus({ github, context, platforms, outputs });
