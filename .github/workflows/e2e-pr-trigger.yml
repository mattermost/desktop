name: E2E PR Trigger

# Adds E2E/Run on non-draft PRs targeting master (signals Matterwick to dispatch
# Electron Playwright Tests). Label is removed when tests finish (e2e-functional.yml
# or e2e-label-cleanup.yml on cancellation).
#
# E2E/Override: skips re-trigger; applying it cancels in-flight runs and strips E2E/Run.
# On synchronize: stale runs for the PR branch are cancelled before re-adding the label.

on:
  pull_request:
    types:
      - opened
      - reopened
      - ready_for_review
      - synchronize
      - labeled
      - unlabeled
    branches:
      - master

concurrency:
  group: e2e-pr-trigger-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  add-e2e-label:
    name: Add E2E/Run label
    runs-on: ubuntu-22.04
    if: >-
      !github.event.pull_request.draft
      && contains(fromJSON('["opened", "reopened", "ready_for_review", "synchronize"]'), github.event.action)
    permissions:
      issues: write
      pull-requests: write
      actions: write
      statuses: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        if: github.event.pull_request.head.repo.full_name == github.repository
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          sparse-checkout: |
            e2e/utils/github-actions.js
          sparse-checkout-cone-mode: false

      - uses: ./.github/actions/e2e-pr-sync
        if: github.event.pull_request.head.repo.full_name == github.repository
        with:
          mode: refresh
          pr_number: ${{ github.event.pull_request.number }}
          head_sha: ${{ github.event.pull_request.head.sha }}
          head_ref: ${{ github.event.pull_request.head.ref }}

  honor-e2e-override:
    name: Honor E2E/Override
    runs-on: ubuntu-22.04
    if: >-
      github.event.action == 'labeled'
      && github.event.label.name == 'E2E/Override'
    permissions:
      issues: write
      pull-requests: write
      actions: write
      statuses: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        if: github.event.pull_request.head.repo.full_name == github.repository
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          sparse-checkout: |
            e2e/utils/github-actions.js
          sparse-checkout-cone-mode: false

      - uses: ./.github/actions/e2e-pr-sync
        if: github.event.pull_request.head.repo.full_name == github.repository
        with:
          mode: override
          pr_number: ${{ github.event.pull_request.number }}
          head_sha: ${{ github.event.pull_request.head.sha }}
          head_ref: ${{ github.event.pull_request.head.ref }}
          status_reason: E2E pending — skipped (E2E/Override label applied)

  cancel-on-manual-unlabel:
    name: Cancel E2E on manual label removal
    runs-on: ubuntu-22.04
    if: >-
      github.event.action == 'unlabeled'
      && github.event.label.name == 'E2E/Run'
      && github.event.sender.login != 'github-actions[bot]'
    permissions:
      actions: write
      statuses: write
      pull-requests: read
      issues: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        if: github.event.pull_request.head.repo.full_name == github.repository
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          sparse-checkout: |
            e2e/utils/github-actions.js
          sparse-checkout-cone-mode: false

      - uses: ./.github/actions/e2e-pr-sync
        if: github.event.pull_request.head.repo.full_name == github.repository
        with:
          mode: stop
          pr_number: ${{ github.event.pull_request.number }}
          head_sha: ${{ github.event.pull_request.head.sha }}
          head_ref: ${{ github.event.pull_request.head.ref }}
