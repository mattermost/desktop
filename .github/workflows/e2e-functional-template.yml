name: E2E Functional Tests Template

on:
  workflow_call:
    inputs:
      MM_TEST_SERVER_URL:
        description: "The test server URL"
        required: false
        type: string
      MM_TEST_USER_NAME:
        description: "The admin username of the test instance"
        required: false
        type: string
      MM_TEST_PASSWORD:
        description: "The admin password of the test instance"
        required: false
        type: string
      DESKTOP_VERSION:
        description: "The desktop version to test"
        required: false
        default: ${{ github.ref }}
        type: string
      runs-on:
        type: string
        description: "The E2E tests underlying OS"
        required: true
      cmt:
        type: boolean
        description: "True if this is Compatibility Matrix Testing"
        required: false
        default: false
      TYPE:
        type: string
        description: "e.g. PR, NIGHTLY, RELEASE or CMT (Compatibility Matrix Testing)"
        required: false
        default: "PR"
      MM_SERVER_VERSION:
        type: string
        required: true
      # Packed as one JSON input, not two, because workflow_call caps reusable
      # workflows at 10 inputs total — this file was already at 8.
      # Shape: {"composite_identity": {...}, "total_reports_expected": "N"}
      tsio-config:
        description: "TSIO reporting config: {composite_identity, total_reports_expected}. Empty disables TSIO reporting for this leg."
        required: false
        type: string
        default: ""
  workflow_dispatch:
    inputs:
      MM_TEST_SERVER_URL:
        description: "The test server URL"
        required: false
        type: string
      MM_TEST_USER_NAME:
        description: "The admin username of the test instance"
        required: false
        type: string
      MM_TEST_PASSWORD:
        description: "The admin password of the test instance"
        required: false
        type: string
      DESKTOP_VERSION:
        description: "The desktop version to test"
        required: false
        default: "master"
        type: string
      runs-on:
        type: string
        description: "The E2E tests underlying OS"
        required: true
        default: "ubuntu-24.04"
      cmt:
        type: boolean
        description: "True if this is Compatibility Matrix Testing"
        required: false
        default: false
      TYPE:
        type: string
        description: "True if this is Triggered from PR"
        required: false
        default: "PR"
      MM_SERVER_VERSION:
        type: string
        required: true
      tsio-config:
        description: "TSIO reporting config: {composite_identity, total_reports_expected}. Empty disables TSIO reporting for this leg."
        required: false
        type: string
        default: ""

env:
  BRANCH: ${{ github.head_ref || github.ref_name }}
  BUILD_TAG: ${{ github.event.pull_request.head.sha || github.sha }}
  MM_TEST_SERVER_URL: ${{ inputs.MM_TEST_SERVER_URL }}
  MM_TEST_USER_NAME: ${{ inputs.MM_TEST_USER_NAME || secrets.MM_DESKTOP_E2E_USER_NAME }}
  MM_TEST_PASSWORD: ${{ inputs.MM_TEST_PASSWORD || secrets.MM_DESKTOP_E2E_USER_CREDENTIALS }}
  SERVER_VERSION: ${{ inputs.MM_SERVER_VERSION }}
  DESKTOP_VERSION: ${{ inputs.DESKTOP_VERSION }}
  PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
  NODE_ENV: "test"
  DEBUG_E2E: "true"

jobs:
  e2e:
    # Includes MM_SERVER_VERSION, not just runs-on: CMT tests multiple server
    # versions against the same runner (e.g. macos-13 x 9.6.1 and macos-13 x
    # 9.5.2)
    name: e2e-on-${{ inputs.runs-on }}-${{ inputs.MM_SERVER_VERSION }}
    runs-on: ${{ inputs.runs-on }}
    permissions:
      contents: read
      id-token: write
      actions: read
    defaults:
      run:
        shell: bash
    steps:
      - name: e2e/set-required-variables
        id: variables
        run: |
          RUNNER_OS=$(echo "${{ runner.os }}" | tr '[:upper:]' '[:lower:]')
          echo "RUNNER_OS=${RUNNER_OS}" >> $GITHUB_ENV
          # Report-only tag for Playwright blob/HTML output (@ci-* avoids colliding with
          # platform selection grep tokens @linux/@darwin/@win32 in playwright.config.ts).
          echo "CI_ENVIRONMENT_NAME=@ci-${RUNNER_OS}" >> $GITHUB_ENV
          
          # Define build type and suffix
          # inputs.TYPE takes precedence when provided by the caller (e.g. RELEASE, MASTER, PR).
          INPUT_TYPE="${{ inputs.TYPE }}"
          case "${{ github.event_name }}" in
            "pull_request")
              echo "BUILD_SUFFIX=desktop-pr-${RUNNER_OS}" >> $GITHUB_OUTPUT
              echo "TYPE=${INPUT_TYPE:-PR}" >> $GITHUB_ENV
              ;;
            "workflow_dispatch")
              if ${{ inputs.cmt }}; then
                echo "BUILD_SUFFIX=desktop-release-${RUNNER_OS}" >> $GITHUB_OUTPUT
                echo "TYPE=${INPUT_TYPE:-CMT}" >> $GITHUB_ENV
                echo "ZEPHYR_ENABLE=true" >> $GITHUB_ENV
                echo "ZEPHYR_FOLDER_${RUNNER_OS^^}_REPORT=${{
                  runner.os == 'Linux' && '12358649' ||
                  runner.os == 'macOS' && '12358650' ||
                  '12358651'
                }}" >> $GITHUB_ENV
              else
                echo "BUILD_SUFFIX=desktop-manual-trigger-${RUNNER_OS}" >> $GITHUB_OUTPUT
                echo "TYPE=${INPUT_TYPE:-MANUAL}" >> $GITHUB_ENV
              fi
              ;;
            "push")
              echo "BUILD_SUFFIX=desktop-push-${RUNNER_OS}" >> $GITHUB_OUTPUT
              ;;
          esac

      - name: e2e/set-build-id
        run: echo "BUILD_ID=${{ github.run_id }}-${{ steps.variables.outputs.BUILD_SUFFIX }}" >> $GITHUB_ENV

      - name: e2e/checkout-repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.DESKTOP_VERSION }}

      - name: e2e/setup-node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '22.x'
          package-manager-cache: false
          # node_modules is cached in e2e/cache-node-modules; disable setup-node's
          # npm cache so actions/cache v5 does not hit legacy entries.

      - name: e2e/use-gnu-tar-macos
        if: runner.os == 'macOS'
        run: echo "/opt/homebrew/opt/gnu-tar/libexec/gnubin" >> $GITHUB_PATH

      - name: e2e/cache-node-modules
        id: cache-node-modules
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            node_modules
            e2e/node_modules
          enableCrossOsArchive: false
          # v7: exact restore only — avoids probing legacy v6 blobs that warn on macOS
          key: ${{ runner.os }}-build-node-modules-v7-${{ hashFiles('**/package-lock.json') }}

      - name: e2e/cache-electron-gyp-windows
        if: runner.os == 'Windows'
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: C:\Users\runneradmin\.electron-gyp
          enableCrossOsArchive: false
          key: ${{ runner.os }}-electron-gyp-v7-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-electron-gyp-v7-${{ hashFiles('**/package-lock.json') }}

      - name: e2e/setup-python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        env:
          # Bypass pip's on-disk HTTP cache entirely so a stale/corrupt entry on the
          # runner image cannot trigger deserialization warnings (actions/setup-python#1317).
          PIP_NO_CACHE_DIR: "1"
        with:
          # Use a version pre-installed on macOS-26 (3.13 is in its toolcache), so
          # setup-python doesn't install a mismatched interpreter whose pip can't
          # deserialize the image's pre-baked cache. PIP_NO_CACHE_DIR above is the
          # remaining guard for non-macOS runners.
          python-version: "3.13"
          # Omit `cache` — setup-python only accepts pip/pipenv/poetry, not `false`.

      - name: e2e/install-os-dependencies
        uses: ./.github/actions/install-os-dependencies
        with:
          os: ${{ runner.os }}

      - name: e2e/install-node-dependencies
        run: |
          npm ci
          cd e2e && npm ci

      - name: e2e/enable-public-links
        if: env.MM_TEST_SERVER_URL != ''
        run: cd e2e && npm run enable-public-links

      - name: e2e/suppress-macos-dialogs
        if: runner.os == 'macOS'
        run: |
          # Suppress the "Reopen windows" dialog that blocks Electron startup
          # when a previous test instance was killed by SIGTERM/SIGKILL.
          # The global-setup.ts also does this, but running it here as well ensures
          # the setting is applied even if the Playwright globalSetup step is skipped.
          defaults write com.github.Electron NSQuitAlwaysKeepsWindows -bool false || true
          defaults write com.github.Electron ApplePersistenceIgnoreState -bool YES || true
          defaults write com.apple.LaunchServices LSQuarantine -bool false || true
          defaults write com.apple.CrashReporter DialogType none || true

      - name: e2e/run-playwright-tests-linux
        if: runner.os == 'Linux'
        run: |
          eval "$(dbus-launch --sh-syntax)"
          export NO_AT_BRIDGE=1
          npm run build-test
          cd e2e
          export PW_CHROMIUM_ARGS="--disable-gpu --no-sandbox --disable-dev-shm-usage"
          set +e
          xvfb-run --auto-servernum --server-args='-screen 0 1024x768x24' npm test -- --project=linux
          echo "PLAYWRIGHT_EXIT_CODE=$?" >> $GITHUB_ENV
        env:
          SERVER_VERSION: ${{ inputs.MM_SERVER_VERSION }}
          DESKTOP_VERSION: ${{ inputs.DESKTOP_VERSION }}
          CI_ENVIRONMENT_NAME: ${{ env.CI_ENVIRONMENT_NAME }}

      - name: e2e/run-playwright-tests-macos
        if: runner.os == 'macOS'
        run: |
          echo "Building test bundle…"
          npm run build-test

          echo "Running E2E tests…"
          cd e2e
          set +e
          npm test -- --project=darwin
          echo "PLAYWRIGHT_EXIT_CODE=$?" >> $GITHUB_ENV
        env:
          SERVER_VERSION: ${{ inputs.MM_SERVER_VERSION }}
          DESKTOP_VERSION: ${{ inputs.DESKTOP_VERSION }}
          CI_ENVIRONMENT_NAME: ${{ env.CI_ENVIRONMENT_NAME }}

      - name: e2e/run-playwright-tests-windows
        if: runner.os == 'Windows'
        run: |
          npm run build-test
          cd e2e
          set +e
          npm test -- --project=win32
          echo "PLAYWRIGHT_EXIT_CODE=$?" >> $GITHUB_ENV
        env:
          SERVER_VERSION: ${{ inputs.MM_SERVER_VERSION }}
          DESKTOP_VERSION: ${{ inputs.DESKTOP_VERSION }}
          CI_ENVIRONMENT_NAME: ${{ env.CI_ENVIRONMENT_NAME }}

      - name: e2e/write-tsio-failure-stub
        if: ${{ always() && inputs.tsio-config != '' && hashFiles('e2e/test-results/results.json') == '' && (failure() || cancelled() || (env.PLAYWRIGHT_EXIT_CODE != '0' && env.PLAYWRIGHT_EXIT_CODE != '')) }}
        run: node e2e/utils/write-tsio-failure-stub.mjs
        env:
          TSIO_GH_JOB_NAME: e2e-on-${{ inputs.runs-on }}-${{ inputs.MM_SERVER_VERSION }}
          PLAYWRIGHT_EXIT_CODE: ${{ env.PLAYWRIGHT_EXIT_CODE }}

      # Reporting only — a TSIO/upload flake (e.g. screenshot 504) must not fail
      # the job when Playwright already passed. Commit status still comes from TSIO summary.
      - name: e2e/upload-report-to-tsio
        if: ${{ always() && inputs.tsio-config != '' && hashFiles('e2e/test-results/results.json') != '' }}
        continue-on-error: true
        uses: mattermost/mattermost-test-system-io/.github/actions/test-system-io-report-upload@81017b2d568d1fc1f1fdaa7299b177fae53c63e1 # 0.10.0 / 2026-05-16
        with:
          composite-identity: ${{ toJSON(fromJSON(inputs.tsio-config).composite_identity) }}
          total-reports-expected: ${{ fromJSON(inputs.tsio-config).total_reports_expected }}
          framework: playwright
          github-token: ${{ secrets.GITHUB_TOKEN }}
          # MUST match this job's `name:` field above.
          gh-job-name: e2e-on-${{ inputs.runs-on }}-${{ inputs.MM_SERVER_VERSION }}
          json-path: e2e/test-results/results.json
          screenshots-dir: e2e/test-results

      - name: e2e/handle-nonzero-playwright-exit
        if: always()
        run: |
          if [ "${PLAYWRIGHT_EXIT_CODE:-1}" = "0" ]; then
            exit 0
          fi
          if [ -n "${TSIO_CONFIG}" ]; then
            echo "::warning::Playwright exited with code ${PLAYWRIGHT_EXIT_CODE:-unset} — not failing the job on this alone, see TSIO report for actual test results"
          else
            echo "Playwright exited with code ${PLAYWRIGHT_EXIT_CODE:-unset} and no TSIO config is set for this run — failing the job since there is no other failure signal" >&2
            exit 1
          fi
        env:
          TSIO_CONFIG: ${{ inputs.tsio-config }}

