name: E2E Functional Tests Template

on:
  workflow_call:
    inputs:
      MM_TEST_SERVER_URL:
        description: "The test server URL"
        required: false
        type: string
      MM_TEST_USER_NAME:
        description: "The admin username of the test instance"
        required: false
        type: string
      MM_TEST_PASSWORD:
        description: "The admin password of the test instance"
        required: false
        type: string
      DESKTOP_VERSION:
        description: "The desktop version to test"
        required: false
        default: ${{ github.ref }}
        type: string
      runs-on:
        type: string
        description: "The E2E tests underlying OS"
        required: true
      nightly:
        type: boolean
        description: "True if this is nightly build"
        required: false
        default: false
      cmt:
        type: boolean
        description: "True if this is Compatibility Matrix Testing"
        required: false
        default: false
      TYPE:
        type: string
        description: "e.g. PR, NIGHTLY, RELEASE or CMT (Compatibility Matrix Testing)"
        required: false
        default: "PR"
      MM_SERVER_VERSION:
        type: string
        required: true
    outputs:
      NEW_FAILURES_LINUX:
        description: "The output to comment"
        value: ${{ jobs.e2e.outputs.NEW_FAILURES_LINUX }}
      NEW_FAILURES_MACOS:
        description: "The output to comment"
        value: ${{ jobs.e2e.outputs.NEW_FAILURES_MACOS }}
      NEW_FAILURES_WINDOWS:
        description: "The output to comment"
        value: ${{ jobs.e2e.outputs.NEW_FAILURES_WINDOWS }}
      REPORT_LINK_LINUX:
        description: "Link to Linux report"
        value: ${{ jobs.e2e.outputs.REPORT_LINK_LINUX }}
      REPORT_LINK_MACOS:
        description: "Link to MacOS report"
        value: ${{ jobs.e2e.outputs.REPORT_LINK_MACOS }}
      REPORT_LINK_WINDOWS:
        description: "Link to Windows report"
        value: ${{ jobs.e2e.outputs.REPORT_LINK_WINDOWS }}
      STATUS_LINUX:
        description: "The status of the linux test"
        value: ${{ jobs.e2e.outputs.STATUS_LINUX }}
      STATUS_MACOS:
        description: "The status of the macOS test"
        value: ${{ jobs.e2e.outputs.STATUS_MACOS }}
      PASSED_LINUX:
        description: "Number of passed tests on Linux"
        value: ${{ jobs.e2e.outputs.PASSED_LINUX }}
      PASSED_MACOS:
        description: "Number of passed tests on macOS"
        value: ${{ jobs.e2e.outputs.PASSED_MACOS }}
      PASSED_WINDOWS:
        description: "Number of passed tests on Windows"
        value: ${{ jobs.e2e.outputs.PASSED_WINDOWS }}
      TOTAL_LINUX:
        description: "Total tests on Linux (passed + failed + skipped)"
        value: ${{ jobs.e2e.outputs.TOTAL_LINUX }}
      TOTAL_MACOS:
        description: "Total tests on macOS (passed + failed + skipped)"
        value: ${{ jobs.e2e.outputs.TOTAL_MACOS }}
      TOTAL_WINDOWS:
        description: "Total tests on Windows (passed + failed + skipped)"
        value: ${{ jobs.e2e.outputs.TOTAL_WINDOWS }}
      SKIPPED_LINUX:
        description: "Number of skipped tests on Linux"
        value: ${{ jobs.e2e.outputs.SKIPPED_LINUX }}
      SKIPPED_MACOS:
        description: "Number of skipped tests on macOS"
        value: ${{ jobs.e2e.outputs.SKIPPED_MACOS }}
      SKIPPED_WINDOWS:
        description: "Number of skipped tests on Windows"
        value: ${{ jobs.e2e.outputs.SKIPPED_WINDOWS }}
      STATUS_WINDOWS:
        description: "The status of the windows test"
        value: ${{ jobs.e2e.outputs.STATUS_WINDOWS }}

  workflow_dispatch:
    inputs:
      MM_TEST_SERVER_URL:
        description: "The test server URL"
        required: false
        type: string
      MM_TEST_USER_NAME:
        description: "The admin username of the test instance"
        required: false
        type: string
      MM_TEST_PASSWORD:
        description: "The admin password of the test instance"
        required: false
        type: string
      DESKTOP_VERSION:
        description: "The desktop version to test"
        required: false
        default: "master"
        type: string
      runs-on:
        type: string
        description: "The E2E tests underlying OS"
        required: true
        default: "ubuntu-24.04"
      nightly:
        type: boolean
        description: "True if this is nightly build"
        required: false
        default: false
      cmt:
        type: boolean
        description: "True if this is Compatibility Matrix Testing"
        required: false
        default: false
      TYPE:
        type: string
        description: "True if this is Triggered from PR"
        required: false
        default: "PR"
      MM_SERVER_VERSION:
        type: string
        required: true

env:
  BRANCH: ${{ github.head_ref || github.ref_name }}
  BUILD_TAG: ${{ github.event.pull_request.head.sha || github.sha }}
  MM_TEST_SERVER_URL: ${{ inputs.MM_TEST_SERVER_URL }}
  MM_TEST_USER_NAME: ${{ inputs.MM_TEST_USER_NAME || secrets.MM_DESKTOP_E2E_USER_NAME }}
  MM_TEST_PASSWORD: ${{ inputs.MM_TEST_PASSWORD || secrets.MM_DESKTOP_E2E_USER_CREDENTIALS }}
  SERVER_VERSION: ${{ inputs.MM_SERVER_VERSION }}
  DESKTOP_VERSION: ${{ inputs.DESKTOP_VERSION }}
  PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
  NODE_ENV: "test"
  DEBUG_E2E: "true"

jobs:
  e2e:
    name: e2e-on-${{ inputs.runs-on }}
    runs-on: ${{ inputs.runs-on }}
    # Runs untrusted PR code (npm ci / Playwright) with a read-only token.
    permissions:
      contents: read
    defaults:
      run:
        shell: bash
    outputs:
      NEW_FAILURES_LINUX: ${{ steps.analyze-flaky-tests.outputs.NEW_FAILURES_LINUX }}
      NEW_FAILURES_MACOS: ${{ steps.analyze-flaky-tests.outputs.NEW_FAILURES_MACOS }}
      NEW_FAILURES_WINDOWS: ${{ steps.analyze-flaky-tests.outputs.NEW_FAILURES_WINDOWS }}
      REPORT_LINK_LINUX: ${{ steps.analyze-flaky-tests.outputs.REPORT_LINK_LINUX }}
      REPORT_LINK_MACOS: ${{ steps.analyze-flaky-tests.outputs.REPORT_LINK_MACOS }}
      REPORT_LINK_WINDOWS: ${{ steps.analyze-flaky-tests.outputs.REPORT_LINK_WINDOWS }}
      STATUS_LINUX: ${{ steps.analyze-flaky-tests.outputs.STATUS_LINUX }}
      STATUS_WINDOWS: ${{ steps.analyze-flaky-tests.outputs.STATUS_WINDOWS }}
      STATUS_MACOS: ${{ steps.analyze-flaky-tests.outputs.STATUS_MACOS }}
      PASSED_LINUX: ${{ steps.analyze-flaky-tests.outputs.PASSED_LINUX }}
      PASSED_MACOS: ${{ steps.analyze-flaky-tests.outputs.PASSED_MACOS }}
      PASSED_WINDOWS: ${{ steps.analyze-flaky-tests.outputs.PASSED_WINDOWS }}
      TOTAL_LINUX: ${{ steps.analyze-flaky-tests.outputs.TOTAL_LINUX }}
      TOTAL_MACOS: ${{ steps.analyze-flaky-tests.outputs.TOTAL_MACOS }}
      TOTAL_WINDOWS: ${{ steps.analyze-flaky-tests.outputs.TOTAL_WINDOWS }}
      SKIPPED_LINUX: ${{ steps.analyze-flaky-tests.outputs.SKIPPED_LINUX }}
      SKIPPED_MACOS: ${{ steps.analyze-flaky-tests.outputs.SKIPPED_MACOS }}
      SKIPPED_WINDOWS: ${{ steps.analyze-flaky-tests.outputs.SKIPPED_WINDOWS }}
    steps:
      - name: e2e/set-required-variables
        id: variables
        run: |
          RUNNER_OS=$(echo "${{ runner.os }}" | tr '[:upper:]' '[:lower:]')
          echo "RUNNER_OS=${RUNNER_OS}" >> $GITHUB_ENV
          echo "CI_ENVIRONMENT_NAME=@${RUNNER_OS}" >> $GITHUB_ENV
          
          # Define build type and suffix
          # inputs.TYPE takes precedence when provided by the caller (e.g. RELEASE, MASTER, PR).
          INPUT_TYPE="${{ inputs.TYPE }}"
          case "${{ github.event_name }}" in
            "pull_request")
              echo "BUILD_SUFFIX=desktop-pr-${RUNNER_OS}" >> $GITHUB_OUTPUT
              echo "TYPE=${INPUT_TYPE:-PR}" >> $GITHUB_ENV
              ;;
            "workflow_dispatch")
              if ${{ inputs.cmt }}; then
                echo "BUILD_SUFFIX=desktop-release-${RUNNER_OS}" >> $GITHUB_OUTPUT
                echo "TYPE=${INPUT_TYPE:-CMT}" >> $GITHUB_ENV
                echo "ZEPHYR_ENABLE=true" >> $GITHUB_ENV
                echo "ZEPHYR_FOLDER_${RUNNER_OS^^}_REPORT=${{
                  runner.os == 'Linux' && '12358649' ||
                  runner.os == 'macOS' && '12358650' ||
                  '12358651'
                }}" >> $GITHUB_ENV
              else
                echo "BUILD_SUFFIX=desktop-manual-trigger-${RUNNER_OS}" >> $GITHUB_OUTPUT
                echo "TYPE=${INPUT_TYPE:-MANUAL}" >> $GITHUB_ENV
              fi
              ;;
            "push")
              echo "BUILD_SUFFIX=desktop-push-${RUNNER_OS}" >> $GITHUB_OUTPUT
              ;;
          esac

          if ${{ inputs.nightly }}; then
            echo "BUILD_SUFFIX=desktop-nightly-${RUNNER_OS}" >> $GITHUB_OUTPUT
            echo "TYPE=NIGHTLY" >> $GITHUB_ENV
          fi

      - name: e2e/set-build-id
        run: echo "BUILD_ID=${{ github.run_id }}-${{ steps.variables.outputs.BUILD_SUFFIX }}" >> $GITHUB_ENV

      - name: e2e/checkout-repo
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ inputs.DESKTOP_VERSION }}

      - name: e2e/setup-node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22.x'
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: e2e/cache-node-modules
        id: cache-node-modules
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            node_modules
            C:\Users\runneradmin\.electron-gyp
          key: ${{ runner.os }}-build-node-modules-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-build-node-modules
            ${{ runner.os }}-build-
            ${{ runner.os }}-

      - name: e2e/setup-python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.10"

      - name: e2e/install-os-dependencies
        uses: ./.github/actions/install-os-dependencies
        with:
          os: ${{ runner.os }}

      - name: e2e/install-node-dependencies
        run: |
          npm ci
          cd e2e && npm ci

      - name: e2e/suppress-macos-dialogs
        if: runner.os == 'macOS'
        run: |
          # Suppress the "Reopen windows" dialog that blocks Electron startup
          # when a previous test instance was killed by SIGTERM/SIGKILL.
          # The global-setup.ts also does this, but running it here as well ensures
          # the setting is applied even if the Playwright globalSetup step is skipped.
          defaults write com.github.Electron NSQuitAlwaysKeepsWindows -bool false || true
          defaults write com.github.Electron ApplePersistenceIgnoreState -bool YES || true
          defaults write com.apple.LaunchServices LSQuarantine -bool false || true
          defaults write com.apple.CrashReporter DialogType none || true

      - name: e2e/run-playwright-tests-linux
        if: runner.os == 'Linux'
        run: |
          eval "$(dbus-launch --sh-syntax)"
          export NO_AT_BRIDGE=1
          npm run build-test
          cd e2e
          export PW_CHROMIUM_ARGS="--disable-gpu --no-sandbox --disable-dev-shm-usage"
          set +e
          xvfb-run --auto-servernum --server-args='-screen 0 1024x768x24' npm test
          echo "PLAYWRIGHT_EXIT_CODE=$?" >> $GITHUB_ENV
        env:
          SERVER_VERSION: ${{ inputs.MM_SERVER_VERSION }}
          DESKTOP_VERSION: ${{ inputs.DESKTOP_VERSION }}
          CI_ENVIRONMENT_NAME: ${{ env.CI_ENVIRONMENT_NAME }}

      - name: e2e/run-playwright-tests-macos
        if: runner.os == 'macOS'
        run: |
          echo "Building test bundle…"
          npm run build-test

          echo "Running E2E tests…"
          cd e2e
          set +e
          npm test
          echo "PLAYWRIGHT_EXIT_CODE=$?" >> $GITHUB_ENV
        env:
          SERVER_VERSION: ${{ inputs.MM_SERVER_VERSION }}
          DESKTOP_VERSION: ${{ inputs.DESKTOP_VERSION }}
          CI_ENVIRONMENT_NAME: ${{ env.CI_ENVIRONMENT_NAME }}

      - name: e2e/run-playwright-tests-windows
        if: runner.os == 'Windows'
        run: |
          npm run build-test
          cd e2e
          set +e
          npm test
          echo "PLAYWRIGHT_EXIT_CODE=$?" >> $GITHUB_ENV
        env:
          SERVER_VERSION: ${{ inputs.MM_SERVER_VERSION }}
          DESKTOP_VERSION: ${{ inputs.DESKTOP_VERSION }}
          CI_ENVIRONMENT_NAME: ${{ env.CI_ENVIRONMENT_NAME }}

      - name: e2e/generate-html-report
        id: generate-html-report
        if: always()
        run: |
          cd e2e
          if [ -d blob-report ] && find blob-report -type f | grep -q .; then
            npx playwright merge-reports --reporter=html blob-report
            echo "html_report_ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "No blob report produced for this OS — skipping HTML generation."
            echo "html_report_ready=false" >> "$GITHUB_OUTPUT"
          fi

      - name: e2e/upload-html-report-to-s3
        id: upload-html-report-to-s3
        if: always() && steps.generate-html-report.outputs.html_report_ready == 'true'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.MM_DESKTOP_E2E_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.MM_DESKTOP_E2E_AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: us-east-1
          AWS_S3_BUCKET: mattermost-cypress-report
          RUN_ID: ${{ github.run_id }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
        run: |
          # Per-OS report path so each platform's status check links to a clean,
          # single-OS view — not an aggregated multi-OS report where counts and
          # "skipped" totals are inflated by cross-OS tags.
          S3_PREFIX="desktop-e2e/${RUN_ID}-${RUN_ATTEMPT}/${RUNNER_OS}"
          aws s3 sync e2e/playwright-report/ "s3://${AWS_S3_BUCKET}/${S3_PREFIX}/" \
            --acl public-read \
            --cache-control "no-cache"
          REPORT_URL="https://${AWS_S3_BUCKET}.s3.amazonaws.com/${S3_PREFIX}/index.html"
          echo "report_url=${REPORT_URL}" >> "$GITHUB_OUTPUT"
          echo "Playwright report (${RUNNER_OS}) uploaded: ${REPORT_URL}" >> "$GITHUB_STEP_SUMMARY"

      - name: e2e/analyze-flaky-tests
        id: analyze-flaky-tests
        if: always()
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          PER_OS_REPORT_URL: ${{ steps.upload-html-report-to-s3.outputs.report_url }}
        with:
          script: |
            process.chdir('./e2e');
            const { analyzeFlakyTests } = require('./utils/analyze-flaky-test.js');
            const { failureCount, passCount, skipCount, totalCount, os } = analyzeFlakyTests();
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;
            const reportUrl = process.env.PER_OS_REPORT_URL || runUrl;
            const testStatus = failureCount > 0 || Number(process.env.PLAYWRIGHT_EXIT_CODE || 0) !== 0 ? 'failure' : 'success';
            const setOSOutputs = (suffix) => {
              core.setOutput(`NEW_FAILURES_${suffix}`, String(failureCount));
              core.setOutput(`REPORT_LINK_${suffix}`, reportUrl);
              core.setOutput(`STATUS_${suffix}`, testStatus);
              core.setOutput(`PASSED_${suffix}`, String(passCount));
              core.setOutput(`SKIPPED_${suffix}`, String(skipCount));
              core.setOutput(`TOTAL_${suffix}`, String(totalCount));
            };
            switch (os) {
              case 'linux':
                setOSOutputs('LINUX');
                break;
              case 'darwin':
                setOSOutputs('MACOS');
                break;
              case 'win32':
                setOSOutputs('WINDOWS');
                break;
              default:
                throw new Error(`Unsupported OS: ${os}`);
            }

      - name: Upload Playwright blob report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: blob-report-${{ env.RUNNER_OS }}
          path: |
            e2e/blob-report
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-results-${{ env.RUNNER_OS }}
          path: |
            e2e/test-results
          if-no-files-found: ignore
          retention-days: 7
