name: Compatibility Matrix Testing

on:
  workflow_dispatch:
    inputs:
      CMT_MATRIX:
        description: "A JSON object representing the testing matrix"
        required: true
        type: string
      DESKTOP_VERSION:
        description: "The desktop version to test"
        required: true

# Supersede an in-flight CMT run for the same ref (e.g. rapid release-branch pushes) so we don't
# pay for overlapping multi-version matrices. Matterwick reaps the cancelled run's provisioned
# servers on its workflow_run "completed" (cancelled) event, matched by the dispatched test
# workflow run id (not commit SHA).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ## This is picked up after the finish for cleanup
  upload-cmt-server-detals:
    runs-on: ubuntu-22.04
    steps:
      - name: cmt/generate-instance-details-file
        run: echo '${{ inputs.CMT_MATRIX }}' > instance-details.json

      - name: cmt/upload-instance-details
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: instance-details.json
          path: instance-details.json
          retention-days: 1

  calculate-commit-hash:
    runs-on: ubuntu-22.04
    outputs:
      DESKTOP_SHA: ${{ steps.repo.outputs.DESKTOP_SHA }}
      TSIO_COMPOSITE_IDENTITY: ${{ steps.tsio-identity.outputs.composite-identity-json }}
      TSIO_TOTAL_REPORTS_EXPECTED: ${{ steps.tsio-identity.outputs.total-reports-expected }}
    steps:
      - name: cmt/checkout-desktop
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.DESKTOP_VERSION }}

      - name: cmt/calculate-mattermost-sha
        id: repo
        run: echo "DESKTOP_SHA=$(git rev-parse HEAD)" >> ${GITHUB_OUTPUT}

      # One composite identity + total-reports-expected for the WHOLE CMT run
      # (every OS x server-version leg), computed once here and threaded into
      # every `e2e` matrix leg below so they land in a single TSIO report group.
      - name: cmt/tsio-identity
        id: tsio-identity
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          MM_SHA: ${{ steps.repo.outputs.DESKTOP_SHA }}
          MM_BRANCH: ${{ inputs.DESKTOP_VERSION }}
          CMT_MATRIX: ${{ inputs.CMT_MATRIX }}
        run: |
          TOTAL=$(echo "${CMT_MATRIX}" | jq -c '(.environment | length) * (.server | length)')
          echo "total-reports-expected=${TOTAL}" >> "$GITHUB_OUTPUT"
          COMPOSITE_IDENTITY=$(jq -nc \
            --arg repo "${GITHUB_REPOSITORY}" \
            --arg sha "${MM_SHA}" \
            --arg run_id "${GITHUB_RUN_ID}" \
            --arg attempt "${GITHUB_RUN_ATTEMPT}" \
            --arg name "cmt-desktop" \
            --arg branch "${MM_BRANCH}" \
            '{repository:$repo, commit_sha:$sha, gh_run_id:$run_id, name:$name, gh_run_attempt:$attempt, branch:$branch}')
          echo "composite-identity-json=${COMPOSITE_IDENTITY}" >> "$GITHUB_OUTPUT"

  update-initial-status:
    runs-on: ubuntu-22.04
    needs:
      - calculate-commit-hash
    steps:
      - uses: mattermost/actions/delivery/update-commit-status@218fd96a63451259dc100e1292a5e44af92fe15d
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          repository_full_name: mattermost/desktop
          commit_sha: ${{ needs.calculate-commit-hash.outputs.DESKTOP_SHA }}
          context: e2e/compatibility-matrix-testing
          description: "Compatibility Matrix Testing for ${{ inputs.DESKTOP_VERSION }} version"
          status: pending

  # Input follows the below schema
  # {
  #   "environment": [
  #     {
  #       "os": "linux",
  #       "runner": "ubuntu-22.04"
  #     },
  #     {
  #       "os": "macos",
  #       "runner": "macos-13"
  #     },
  #     {
  #       "os": "windows",
  #       "runner": "windows-2022"
  #     }
  #   ],
  #   "server": [
  #     {
  #       "version": "9.6.1",
  #       "url": "https://delivery-cmt-8467830017-9-6-1.test.mattermost.cloud/"
  #     },
  #     {
  #       "version": "9.5.2",
  #       "url": "https://delivery-cmt-8467830017-9-5-2.test.mattermost.cloud/"
  #     }
  #   ]
  # }
  e2e:
    name: ${{ matrix.environment.os }}-${{ matrix.server.version }}
    uses: ./.github/workflows/e2e-functional-template.yml
    needs:
      - calculate-commit-hash
      - update-initial-status
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(inputs.CMT_MATRIX) }}
    # A reusable workflow can only receive permissions the calling job itself
    # already holds — the nested e2e job's TSIO reporting steps need
    # actions:read + id-token:write (same fix as e2e-functional.yml's e2e-tests
    # job; this workflow has no top-level `permissions:` default, so without
    # this the nested job would hit the same "requesting actions:read,
    # id-token:write but only allowed none" rejection e2e-functional.yml hit).
    permissions:
      contents: read
      actions: read
      id-token: write
    secrets: inherit
    with:
      runs-on: ${{ matrix.environment.runner }}
      cmt: true
      MM_TEST_SERVER_URL: ${{ matrix.server.url }}
      DESKTOP_VERSION: ${{ inputs.DESKTOP_VERSION }}
      MM_SERVER_VERSION: ${{ matrix.server.version }}
      TYPE: "CMT"
      # Packed as one JSON input (see e2e-functional-template.yml's tsio-config) —
      # workflow_call caps reusable workflows at 10 inputs total.
      tsio-config: ${{ format('{{"composite_identity":{0},"total_reports_expected":"{1}"}}', needs.calculate-commit-hash.outputs.TSIO_COMPOSITE_IDENTITY, needs.calculate-commit-hash.outputs.TSIO_TOTAL_REPORTS_EXPECTED) }}

  # Consolidated final status + rollup summary, via Test System IO instead of
  # the hand-rolled artifact-based rollup. One TSIO report group covers every
  # OS x server-version leg of the CMT run; commit status target_url deep-links
  # that dashboard page. Context name unchanged (e2e/compatibility-matrix-testing).
  # https://mattermost.atlassian.net/browse/CLD-5815
  update-final-status:
    runs-on: ubuntu-22.04
    if: always()
    permissions:
      contents: read
      id-token: write
      statuses: write
    needs:
      - calculate-commit-hash
      - e2e
    steps:
      - name: Render TSIO summary + flip commit status
        id: summary
        uses: mattermost/mattermost-test-system-io/.github/actions/test-system-io-summary@a2ea7f005484c28fedf51e16645f6d3bd683fd63 # 0.10.0 / 2026-05-16
        with:
          composite-identity: ${{ needs.calculate-commit-hash.outputs.TSIO_COMPOSITE_IDENTITY }}
          framework: playwright
          commit-status-context: e2e/compatibility-matrix-testing
          report-type: RELEASE
          ref-branch: ${{ inputs.DESKTOP_VERSION }}
          github-token: ${{ secrets.GITHUB_TOKEN }}


  # Instance cleanup is handled by Matterwick: when this workflow completes, GitHub sends a
  # workflow_run "completed" event and Matterwick destroys the servers it provisioned for this
  # run (matched by commit SHA). No in-workflow cleanup call is needed.
